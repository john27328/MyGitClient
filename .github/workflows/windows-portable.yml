name: Windows portable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $versionMatch = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"$'
          if (-not $versionMatch) {
            throw "Could not read the project version from pyproject.toml."
          }
          $expectedTag = "v$($versionMatch.Matches[0].Groups[1].Value)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match project version $expectedTag."
          }
          git fetch origin master --no-tags
          git merge-base --is-ancestor $env:GITHUB_SHA origin/master
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag must point to a commit reachable from master."
          }
      - name: Build and smoke-test portable archive
        shell: pwsh
        run: ./scripts/build-windows.ps1 -Python python
      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: MyGitClient-windows-portable
          path: |
            artifacts/*.zip
            artifacts/*.zip.sha256
          if-no-files-found: error
          compression-level: 0
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem artifacts -File |
            Where-Object { $_.Name -like '*.zip' -or $_.Name -like '*.zip.sha256' } |
            ForEach-Object { $_.FullName }
          if ($assets.Count -ne 2) {
            throw "Expected a portable ZIP and its SHA-256 checksum."
          }
          gh release create $env:GITHUB_REF_NAME @assets `
            --verify-tag `
            --generate-notes `
            --title "MyGitClient $env:GITHUB_REF_NAME"
